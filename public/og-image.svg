<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f7fc" />
      <stop offset="100%" stop-color="#e6edf9" />
    </linearGradient>
    <radialGradient id="aurora" cx="0.85" cy="0.15" r="0.8">
      <stop offset="0%" stop-color="hsl(220, 95%, 54%)" stop-opacity="0.15" />
      <stop offset="100%" stop-color="hsl(220, 95%, 54%)" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#aurora)" />

  <!-- Pin de localização -->
  <g transform="translate(140, 215)">
    <path
      d="M100 16C64 16 36 44 36 80c0 44 64 104 64 104s64-60 64-104c0-36-28-64-64-64z"
      fill="hsl(220, 95%, 54%)"
    />
    <circle cx="100" cy="80" r="26" fill="white" />
  </g>

  <!-- Wordmark -->
  <g transform="translate(360, 245)">
    <text
      x="0"
      y="0"
      font-family="Poppins, system-ui, sans-serif"
      font-size="96"
      font-weight="800"
      fill="hsl(220, 30%, 12%)"
    >
      Confere<tspan fill="hsl(220, 95%, 54%)">Aqui</tspan>
    </text>
    <text
      x="4"
      y="44"
      font-family="Poppins, system-ui, sans-serif"
      font-size="22"
      font-weight="600"
      fill="hsl(222, 10%, 48%)"
      letter-spacing="6"
    >
      CONSULTA SEGURA
    </text>
  </g>

  <!-- Tagline -->
  <text
    x="600"
    y="450"
    text-anchor="middle"
    font-family="Poppins, system-ui, sans-serif"
    font-size="38"
    font-weight="700"
    fill="hsl(220, 30%, 12%)"
  >
    Consulte informações de forma rápida e segura
  </text>
  <text
    x="600"
    y="500"
    text-anchor="middle"
    font-family="Poppins, system-ui, sans-serif"
    font-size="38"
    font-weight="700"
    fill="hsl(220, 95%, 54%)"
  >
    a partir do CPF
  </text>

  <!-- Selo inferior -->
  <g transform="translate(600, 575)">
    <rect x="-200" y="-26" width="400" height="44" rx="22" fill="white" stroke="hsl(220, 14%, 88%)" stroke-width="1" />
    <text
      x="0"
      y="6"
      text-anchor="middle"
      font-family="Poppins, system-ui, sans-serif"
      font-size="18"
      font-weight="700"
      fill="hsl(220, 30%, 12%)"
      letter-spacing="2"
    >
      confereaqui.com · LGPD
    </text>
  </g>
